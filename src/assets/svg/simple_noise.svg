<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
  <defs>
    <pattern id="noise" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      
      <!-- random dots -->
      <circle cx="0.5" cy="0.5" r="0.5" fill="white" opacity="0.75"/>
      <circle cx="3" cy="1" r="0.5" fill="white" opacity="0.5"/>
      <circle cx="3.5" cy="3" r="0.5" fill="white" opacity="1"/>
      <circle cx="1.5" cy="2.5" r="0.5" fill="white" opacity="0.6"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="url(#noise)" filter="url(#noiseFilter)"/>
</svg>